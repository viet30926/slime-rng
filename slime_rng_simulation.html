<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=deivce-width, initial-scale=1.0">
 <title>Slime RNG Simulation</title>
 <style>
  *, *::before, *::after {box-sizing: border-box; margin: 0; padding: 0;}
  body{
   background: #13121a;
   min-height: 100vh;
   padding: 2rem 1.5rem;
   font-family: -apple-system, BlinkMacSystemFont, "Segoe UI£, sans-serif;
  }

  .wrapper{
   max-width: 1140px;
   margin: 0 auto;
   background: #0f0e1a;
   border-radius: 20px;
   padding: 2rem;
   border: 1px solid #1e1a30;
   position: relative;
   overflow: hidden;
  }

  .bg-orb{
   position: absolute;
   border-radius: 50%;
   filter: blur(60px);
   opacity: 0.2;
   pointer-events: none;
  }
  .orb1 {width: 320px; height: 320px; background: #6040d0; top: -80px; left: -60px;}
  .orb2 {width: 240px; height: 240px; background: #a040c0; top: -40px; right: -40px;}

  .header{
   display: flex;
   aling-items: center;
   justify-content: space-between;
   position: relative;
   z-index: 1;
  }

  .header-left{
   display: flex;
   align-items: center;
   gap: 14px;
  }

  .title-block{
   display: flex;
   flex-direction: column;
   gap: 2px;
  }

  .eyebrow{
   font-size: 10px;
   font-weight: 500;
   letter-spacing: 0.18em;
   text-transform: uppercase;
   color: #7060b0;
  }

  .title{
   font-size: 28px;
   font-weight: 700;
   letter-spacing: -0.5px;
   line-height: 1;
   background: linear-gradient(120deg, #d0c8ff 0%, #a880ff 50%, #e070cc 100%);
   -webkit-background-clip: text;
   -webkit-text-fill-color: transparent;
   background-clip: text;
  }

  .alpha-tag{
   display: flex;
   align-items: center;
   gap: 6px;
   padding: 5px 14px 5px 10px;
   border-radius: 999px;
   border: 1px solid #4a3880;
   background: rgba(80, 50, 160, 0.18);
  }

  .alpha-dot{
   width: 6px;
   height: 6px;
   border-radius: 50%;
   background: #9070e0;
   animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse{
   0%, 100% {opacity: 1; transform: scale(1);}
   50% {opacity: 0.5; transform: scale(0.7);}
  }

  .alpha-text{
   font-size: 11px;
   font-weight: 700;
   letter-spacing: 0.12em;
   text-transform: uppercase;
   color: #b090f0;
  }

  .divider-line{
   margin-top: 1.75rem;
   height: 1px;
   background: linear-gradient(90deg, transparent, #2e2548 30%, #4a3880 50%, #2e2548 70%, transparent);
   position: relative;
   z-index: 1;
  }

  .content{
   position: relative;
   z-index: 1;
   margin-top: 1.75rem;
  }

  .section-header{
   display: flex;
   align-items: center;
   justify-content: space-between;
   margin-bottom: 1rem;
  }

  .section-title{
   font-size: 12px;
   font-weight: 700;
   color: #7060c0;
   letter-spacing: 0.1em;
   text-transform: uppercase;
  }

  .equipped-badge{
   font-size: 12px;
   font-weight: 600;
   color: #5a5080;
   background: rgba(80, 50, 120, 0.18);
   border: 1px solid #2e2448;
   border-radius: 999px;
   padding: 3px 12px
  }

  .controls-row{
   display: flex;
   align-items: center;
   gap: 10px;
   margin-bottom: 1.25rem;
  }

  .ctrl-label{
   font-size: 12px;
   color: #5a5080;
   white-space: nowrap;
  }

  .ctrl-btn{
   width: 28px;
   height: 28px;
   border-radius: 8px;
   border: 1px solid #2e2448;
   background: #1a1828;
   color: #a090d0;
   font-size: 16px;
   cursor: pointer;
   display: flex;
   align-items: center;
   justify-content: center;
   line-height: 1;
   transition: all 0.12s;
   font-family: inherit;
  }
  .ctrl-btn:hover{background: #252040; border-color: #5040a0; color: #c0b0f0;}
  ctrl.btn:disabled{opacity: 0.3; cursor: not-allowed;}
  
  .ctrl-count{
   font-size: 14px;
   font-weight: 700;
   color: #c0b0f0;
   min-width: 20px;
   text-align: center;
  }

  .slots-grid{
   display: gridl
   grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
   gap: 10px;
  }

  .slot{
   aspect-ratio: 1;
   border-radius: 14px;
   border: 1.5px dashed #2e2448;
   background: #15132a;
   display: flex;
   flex-direction: column;
   align-items: center;
   justify-content: center;
   cursor: pointer;
   transition: all 0.15s;
   position: relative;
  }
  .slot:hover{border-color: #5040a0; background: #1c1838;}

  .slot-plus{
   width: 36px;
   height: 36px;
   border-radius: 10px;
   border: 1.5px solid #3a3060;
   background: #1e1a36;
   display: flex;
   align-items: center;
   justify-content: center;
   margin-bottom: 6px;
   transition: all 0.15s;
  }
  .slot:hover .slot-plus-icon{color: #8070c0;}

  .slot-label{
   font-size: 10px;
   color: #3a3060;
   font-weight: 500;
   letter-spacing: 0.06em;
   transition: color 0.15s;
  }
  .slot:hover .slot-lave{color: #7060b0}

  .inv-divider{
   margin-top: 2rem;
   height: 1px;
   background: linear-gradient(90deg, transparent, #2e2548 30%, #4a3880 50%, #2e2548 70%, transparent);
  }

  .inv-section{margin-top: 1.5rem;}

  .inv-label{
   font-size: 12px;
   font-weight: 700;
   color: #3a3060;
   letter-spacing: 0.1em;
   text-transform: uppercase;
   margin-bottom: 0.75rem;
  }

  .inv-empty{
   background: #15132a;
   border: 1.5px dashed #1e1a30;
   border-radius: 14px;
   padding: 2.5rem;
   text-align: center;
   color: #2e2a48;
   font-size: 13px;
  }
 </style>
</head>

<body>
 <div class="wrapper">
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="header">
   <div class="header-left">
    <div class="title-block">
     <span class="eyebrow">Simulate Slime Teams & Stats!</span>
     <span class="title">Slime RNG Simulation</span>
    </div>
    <div class="alpha-tag">
     <div class="alpha-dot"></div>
     <span class="alpha-text">Alpha</span>
    </div>
   </div>
  </div>

  <div class="divider-line"></div>

  <div class="content">
   <div class="section-header">
    <span class="section-title">Slime Team</span>
    <span class="equipped-badge" id="equipped-label">0 / 1 Equipped</span>
   </div>

   <div class="controls-row">
    <span class="ctrl-label">Max Slots</span>
    <button class="ctrl-btn" id="btn-minus" onclick="ChangeSlots(-1)">-</button>
    <span class="ctrl-count" id="slot-count">1</span>
    <button class="ctrl-btn" id="btn-plus" onclick="ChangeSlots(1)">+</button>
   </div>

   <div class="slots-grid" id="slots-grid"></div>

   <div class="inv-divider"></div>
   <div class="inv-section">
    <div class="inv-label">Inventory</div>
    <div class="inv-empty">Coming Soon!</div>
   </div>
 </div>

  <script>
   let MaxSlots = 1;
   const Equipped = 0;

   function ChangeSlots(delta){
    MaxSlots = Math.max(1, Math.Min(8, MaxSlots + delta));
    document.getElementById('slot-count').textContent = MaxSlots;
    document.getElementById('btn-minus').disabled = MaxSlots <= 1;
    document.getElementById('btn-plus').disabled = MaxSlots >= 8;
    document.getElementById('equipped-label').textContent = Equipped + ' / ' + MaxSlots + ' Equipped';
    RenderSlots();
   }

   function RenderSlots(){
    const grid = document.getElementById('slots-grid');
    grid.innerHTML = '';
    for (let i = 0; i < MaxSlots; i++){
     const Slot = document.createElement('div');
     Slot.className = 'Slot';
     Slot.innerHTML = `
        <div class="slot-plus"><span class="slot-plus-icon">+</span></div>
        <span class="slot-label">Empty slot</span>
      `;
      grid.appendChild(Slot);
    }
   }
   ChangeSlots(0);
  </script>
</body>
</html>
