<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=deivce-width, initial-scale=1.0">
 <title>Slime RNG Simulation</title>
 <style>
  *, *::before, *::after {box-sizing: border-box; margin: 0; padding: 0;}
  body{
   background: #13121a;
   min-height: 100vh;
   padding: 2rem 1.5rem;
   font-family: -apple-system, BlinkMacSystemFont, "Segoe UI£, sans-serif;
  }

  .wrapper{
   max-width: 1140px;
   margin: 0 auto;
   background: #0f0e1a;
   border-radius: 20px;
   padding: 2rem;
   border: 1px solid #1e1a30;
   position: relative;
   overflow: hidden;
  }

  .bg-orb{
   position: absolute;
   border-radius: 50%;
   filter: blur(60px);
   opacity: 0.2;
   pointer-events: none;
  }
  .orb1 {width: 320px; height: 320px; background: #6040d0; top: -80px; left: -60px;}
  .orb2 {width: 240px; height: 240px; background: #a040c0; top: -40px; right: -40px;}

  .header{
   display: flex;
   aling-items: center;
   justify-content: space-between;
   position: relative;
   z-index: 1;
  }

  .header-left{
   display: flex;
   align-items: center;
   gap: 14px;
  }

  .title-block{
   display: flex;
   flex-direction: column;
   gap: 2px;
  }

  .eyebrow{
   font-size: 10px;
   font-weight: 500;
   letter-spacing: 0.18em;
   text-transform: uppercase;
   color: #7060b0;
  }

  .title{
   font-size: 28px;
   font-weight: 700;
   letter-spacing: -0.5px;
   line-height: 1;
   background: linear-gradient(120deg, #d0c8ff 0%, #a880ff 50%, #e070cc 100%);
   -webkit-background-clip: text;
   -webkit-text-fill-color: transparent;
   background-clip: text;
  }

  .alpha-tag{
   display: flex;
   align-items: center;
   gap: 6px;
   padding: 5px 14px 5px 10px;
   border-radius: 999px;
   border: 1px solid #4a3880;
   background: rgba(80, 50, 160, 0.18);
  }

  .alpha-dot{
   width: 6px;
   height: 6px;
   border-radius: 50%;
   background: #9070e0;
   animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse{
   0%, 100% {opacity: 1; transform: scale(1);}
   50% {opacity: 0.5; transform: scale(0.7);}
  }

  .alpha-text{
   font-size: 11px;
   font-weight: 700;
   letter-spacing: 0.12em;
   text-transform: uppercase;
   color: #b090f0;
  }

  .divider-line{
   margin-top: 1.75rem;
   height: 1px;
   background: linear-gradient(90deg, transparent, #2e2548 30%, #4a3880 50%, #2e2548 70%, transparent);
   position: relative;
   z-index: 1;
  }

  .version-row{
   display: flex;
   justify-content: flex-end;
   margin-top: 1rem;
   position: relative;
   z-index: 1;
  }

  .version-tag{
   font-size: 11[x;
   color: #ded7fc;
   letter-spacing: 0.04em;
  }
 </style>
</head>

<body>
 <div class="wrapper">
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="header">
   <div class="header-left">
    <div class="title-block">
     <span class="eyebrow">Slime RNG</span>
     <span class="title">Slime RNG Simulation</span>
    </div>
    <div class="alpha-tag">
     <div class="alpha-dot"></div>
     <span class="alpha-text">Alpha</span>
    </div>
   </div>
  </div>

  <div class="divider-line"></div>

  <div class="version-row">
   <span class="version-tag">v0.1.0-alpha</span>
  </div>
 </div>
</body>
</html>
