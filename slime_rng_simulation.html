<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slime RNG Simulation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #13121a;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrapper {
      max-width: 1140px;
      margin: 0 auto;
      background: #0f0e1a;
      border-radius: 20px;
      padding: 2rem;
      border: 1px solid #1e1a30;
      position: relative;
      overflow: hidden;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.2;
      pointer-events: none;
    }
    .orb1 { width: 320px; height: 320px; background: #6040d0; top: -80px; left: -60px; }
    .orb2 { width: 240px; height: 240px; background: #a040c0; top: -40px; right: -40px; }

    .header { display: flex; align-items: center; gap: 14px; position: relative; z-index: 1; }
    .title-block { display: flex; flex-direction: column; gap: 2px; }
    .eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #7060b0; }
    .title {
      font-size: 28px; font-weight: 700; letter-spacing: -0.5px; line-height: 1;
      background: linear-gradient(120deg, #d0c8ff 0%, #a880ff 50%, #e070cc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .alpha-tag {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 14px 5px 10px; border-radius: 999px;
      border: 1px solid #4a3880; background: rgba(80, 50, 160, 0.18);
    }
    .alpha-dot { width: 6px; height: 6px; border-radius: 50%; background: #9070e0; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.7); } }
    .alpha-text { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #b090f0; }

    .divider-line {
      margin-top: 1.75rem; height: 1px;
      background: linear-gradient(90deg, transparent, #2e2548 30%, #4a3880 50%, #2e2548 70%, transparent);
      position: relative; z-index: 1;
    }

    .content { position: relative; z-index: 1; margin-top: 1.75rem; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-title { font-size: 12px; font-weight: 700; color: #7060c0; letter-spacing: 0.1em; text-transform: uppercase; }

    .section-header-right { display: flex; align-items: center; gap: 10px; }
    .equipped-badge {
      font-size: 12px; font-weight: 600; color: #5a5080;
      background: rgba(80, 50, 120, 0.18); border: 1px solid #2e2448;
      border-radius: 999px; padding: 3px 12px;
    }

    .clear-btn {
      font-size: 11px; font-weight: 600; color: #6a3040;
      background: rgba(120, 40, 60, 0.12); border: 1px solid #4a2030;
      border-radius: 999px; padding: 3px 12px; cursor: pointer;
      font-family: inherit; transition: all 0.12s;
    }
    .clear-btn:hover { color: #e06070; border-color: #8a3050; background: rgba(160, 40, 70, 0.2); }

    .controls-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
    .ctrl-label { font-size: 12px; color: #5a5080; white-space: nowrap; }
    .ctrl-btn {
      width: 28px; height: 28px; border-radius: 8px; border: 1px solid #2e2448;
      background: #1a1828; color: #a090d0; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1; transition: all 0.12s; font-family: inherit;
    }
    .ctrl-btn:hover { background: #252040; border-color: #5040a0; color: #c0b0f0; }
    .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .ctrl-count { font-size: 14px; font-weight: 700; color: #c0b0f0; min-width: 20px; text-align: center; }

    .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }

    .slot {
      aspect-ratio: 1; border-radius: 14px; border: 1.5px dashed #2e2448;
      background: #15132a; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s; position: relative;
    }
    .slot:hover { border-color: #5040a0; background: #1c1838; }
    .slot-plus {
      width: 36px; height: 36px; border-radius: 10px;
      border: 1.5px solid #3a3060; background: #1e1a36;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 6px; transition: all 0.15s;
    }
    .slot:hover .slot-plus { border-color: #6050b0; background: #252050; }
    .slot-plus-icon { font-size: 18px; color: #4a4080; line-height: 1; transition: color 0.15s; }
    .slot:hover .slot-plus-icon { color: #8070c0; }
    .slot-empty-label { font-size: 10px; color: #3a3060; font-weight: 500; letter-spacing: 0.06em; transition: color 0.15s; }
    .slot:hover .slot-empty-label { color: #7060b0; }
    .slot-name { font-size: 12px; font-weight: 700; text-align: center; }
    .slot-tier { font-size: 9px; color: #5a5080; text-align: center; }
    .slot-mut { font-size: 8px; color: #8070b0; text-align: center; line-height: 1.4; }

    .inv-divider {
      margin-top: 2rem; height: 1px;
      background: linear-gradient(90deg, transparent, #2e2548 30%, #4a3880 50%, #2e2548 70%, transparent);
    }

    .inv-section {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height 0.4s ease, opacity 0.35s ease, margin-top 0.35s ease;
      margin-top: 0;
    }
    .inv-section.open { max-height: 900px; opacity: 1; margin-top: 1.5rem; }

    .inv-body { display: flex; gap: 14px; align-items: flex-start; }
    .inv-left { flex: 1; min-width: 0; }

    .inv-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .inv-label { font-size: 12px; font-weight: 700; color: #7060c0; letter-spacing: 0.1em; text-transform: uppercase; }
    .inv-close-btn {
      font-size: 11px; font-weight: 600; color: #4a4070;
      background: none; border: 1px solid #2a2248; border-radius: 999px;
      padding: 3px 12px; cursor: pointer; font-family: inherit; transition: all 0.12s;
    }
    .inv-close-btn:hover { color: #9080c0; border-color: #4a3880; background: rgba(80,50,120,0.15); }

    .inv-search {
      width: 100%; padding: 10px 14px;
      background: #1a1828; border: 1.5px solid #2a2245;
      border-radius: 10px; color: #e8e8f0; font-size: 14px;
      font-family: inherit; outline: none; margin-bottom: 1rem;
      transition: border-color 0.15s;
    }
    .inv-search::placeholder { color: #3a3460; }
    .inv-search:focus { border-color: #5a50a0; }

    .inv-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px; max-height: 340px; overflow-y: auto; padding-right: 4px;
    }
    .inv-grid::-webkit-scrollbar { width: 5px; }
    .inv-grid::-webkit-scrollbar-track { background: transparent; }
    .inv-grid::-webkit-scrollbar-thumb { background: #2e2448; border-radius: 3px; }

    .inv-card {
      border-radius: 12px; border: 1.5px solid #2a2245;
      background: #18162c; padding: 14px 10px 12px;
      text-align: center; cursor: pointer; transition: all 0.12s;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    .inv-card:hover { background: #201e3a; border-color: #5040a0; }
    .inv-card.selected { border-color: #8060d0; background: #221e42; }
    .inv-card-name { font-size: 13px; font-weight: 700; color: #d0c8f0; }
    .inv-card-tier { font-size: 10px; font-weight: 500; }
    .inv-no-results { grid-column: 1 / -1; text-align: center; padding: 2rem; color: #2e2a48; font-size: 13px; }

    .mut-panel {
      width: 200px; flex-shrink: 0;
      background: #13112a; border: 1.5px solid #2a2245;
      border-radius: 14px; padding: 1.25rem 1rem;
      display: flex; flex-direction: column; gap: 10px;
      opacity: 0; transform: translateX(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .mut-panel.visible { opacity: 1; transform: translateX(0); pointer-events: all; }

    .mut-panel-title { font-size: 11px; font-weight: 700; color: #5a50a0; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
    .mut-slime-name { font-size: 14px; font-weight: 700; color: #d0c8f0; margin-bottom: 6px; }
    .mut-divider { height: 1px; background: #2a2245; margin: 2px 0; }

    .mut-tags { display: flex; flex-direction: column; gap: 7px; }
    .mut-tag {
      padding: 8px 12px; border-radius: 8px; border: 1.5px solid #2a2245;
      background: #1a1828; color: #6050a0; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.12s; font-family: inherit; text-align: left;
      letter-spacing: 0.04em;
    }
    .mut-tag:hover { border-color: #4a3880; color: #a090d0; background: #201e38; }
    .mut-tag.active { border-color: #7060c0; background: #221e42; color: #c0b0f0; }
    .mut-tag.disabled { opacity: 0.25; cursor: not-allowed; }

    .mut-preview {
      font-size: 10px; color: #5a5080; min-height: 14px;
      font-style: italic; letter-spacing: 0.03em;
    }

    .apply-btn {
      margin-top: 4px; padding: 10px; border-radius: 10px;
      border: 1.5px solid #5040a0; background: rgba(80,50,160,0.2);
      color: #c0b0f0; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all 0.12s;
      letter-spacing: 0.04em;
    }
    .apply-btn:hover { background: rgba(100,70,200,0.35); border-color: #8060d0; color: #e0d8ff; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>

    <div class="header">
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="title-block">
          <span class="eyebrow">Simulate Slime Teams, Stats &amp; More!</span>
          <span class="title">Slime RNG Simulation</span>
        </div>
        <div class="alpha-tag">
          <div class="alpha-dot"></div>
          <span class="alpha-text">Alpha</span>
        </div>
      </div>
    </div>

    <div class="divider-line"></div>

    <div class="content">
      <div class="section-header">
        <span class="section-title">Slime Team</span>
        <div class="section-header-right">
          <button class="clear-btn" onclick="ClearTeam()">✕ Clear Team</button>
          <span class="equipped-badge" id="equipped-label">0 / 1 Equipped</span>
        </div>
      </div>

      <div class="controls-row">
        <span class="ctrl-label">Max Slots</span>
        <button class="ctrl-btn" id="btn-minus" onclick="ChangeSlots(-1)">−</button>
        <span class="ctrl-count" id="slot-count">1</span>
        <button class="ctrl-btn" id="btn-plus" onclick="ChangeSlots(1)">+</button>
      </div>

      <div class="slots-grid" id="slots-grid"></div>

      <div class="inv-divider"></div>

      <div class="inv-section" id="inv-section">
        <div class="inv-header">
          <span class="inv-label">Inventory — Select a Slime</span>
          <button class="inv-close-btn" onclick="CloseInventory()">✕ Close</button>
        </div>
        <div class="inv-body">
          <div class="inv-left">
            <input type="text" class="inv-search" id="inv-search" placeholder="Search Slimes..." oninput="RenderInventory()" />
            <div class="inv-grid" id="inv-grid"></div>
          </div>
          <div class="mut-panel" id="mut-panel">
            <span class="mut-panel-title">Mutations</span>
            <span class="mut-slime-name" id="mut-slime-name">—</span>
            <div class="mut-divider"></div>
            <div class="mut-tags" id="mut-tags"></div>
            <span class="mut-preview" id="mut-preview"></span>
            <button class="apply-btn" onclick="ApplySlime()">Equip →</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const slimes = [
      { name: "Goopy", tier: "Basic", color: "#aaaaaa" },
    ];

    const MUT_ORDER = ["Shiny", "Big", "Huge", "Inverted"];
    const SIZE_GROUP = new Set(["Big", "Huge"]);

    let MaxSlots = 1;
    let ActiveSlotIndex = null;
    let PendingSlime = null;
    let ActiveMutations = new Set();

    const SlotData = Array(8).fill(null);

    function OrderedMutations(MutSet) {
      return MUT_ORDER.filter(m => MutSet.has(m));
    }

    function MutLabel(MutSet) {
      const ordered = OrderedMutations(MutSet);
      return ordered.length ? ordered.join(' ') : '';
    }

    function FuzzyScore(query, target) {
      query = query.toLowerCase(); target = target.toLowerCase();
      if (target.includes(query)) return 1000 + (1000 - target.indexOf(query));
      let qi = 0, score = 0, lastMatch = -1;
      for (let ti = 0; ti < target.length && qi < query.length; ti++) {
        if (target[ti] === query[qi]) { score += 10 - (ti - lastMatch - 1); lastMatch = ti; qi++; }
      }
      return qi === query.length ? score : -1;
    }

    function ChangeSlots(delta) {
      const prev = MaxSlots;
      MaxSlots = Math.max(1, Math.min(8, MaxSlots + delta));
      if (MaxSlots < prev) {
        for (let i = MaxSlots; i < prev; i++) SlotData[i] = null;
      }
      document.getElementById('slot-count').textContent = MaxSlots;
      document.getElementById('btn-minus').disabled = MaxSlots <= 1;
      document.getElementById('btn-plus').disabled = MaxSlots >= 8;
      UpdateEquippedLabel();
      RenderSlots();
      CloseInventory();
    }

    function UpdateEquippedLabel() {
      const equipped = SlotData.slice(0, MaxSlots).filter(Boolean).length;
      document.getElementById('equipped-label').textContent = equipped + ' / ' + MaxSlots + ' Equipped';
    }

    function ClearTeam() {
      for (let i = 0; i < 8; i++) SlotData[i] = null;
      UpdateEquippedLabel();
      RenderSlots();
      CloseInventory();
    }

    function RenderSlots() {
      const grid = document.getElementById('slots-grid');
      grid.innerHTML = '';
      for (let i = 0; i < MaxSlots; i++) {
        const slot = document.createElement('div');
        slot.className = 'slot';
        const data = SlotData[i];
        if (data) {
          slot.style.borderStyle = 'solid';
          slot.style.borderColor = data.color;
          slot.style.background = '#1a1636';
          const label = MutLabel(new Set(data.mutations || []));
          slot.innerHTML = `
            <span class="slot-name" style="color:${data.color}">${data.name}</span>
            <span class="slot-tier">${data.tier}</span>
            ${label ? `<span class="slot-mut">${label}</span>` : ''}
          `;
        } else {
          slot.innerHTML = `
            <div class="slot-plus"><span class="slot-plus-icon">+</span></div>
            <span class="slot-empty-label">Empty slot</span>
          `;
        }
        const idx = i;
        slot.onclick = () => OpenInventory(idx);
        grid.appendChild(slot);
      }
    }

    function OpenInventory(SlotIndex) {
      ActiveSlotIndex = SlotIndex;
      PendingSlime = null;
      ActiveMutations.clear();
      const section = document.getElementById('inv-section');
      section.classList.add('open');
      document.getElementById('inv-search').value = '';
      document.getElementById('mut-panel').classList.remove('visible');
      RenderInventory();
      RenderMutPanel();
      setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }

    function CloseInventory() {
      document.getElementById('inv-section').classList.remove('open');
      ActiveSlotIndex = null;
      PendingSlime = null;
      ActiveMutations.clear();
    }

    function RenderInventory() {
      const query = document.getElementById('inv-search').value.trim();
      const grid = document.getElementById('inv-grid');
      grid.innerHTML = '';
      let results = slimes
        .map(s => ({ slime: s, score: query ? FuzzyScore(query, s.name) : 0 }))
        .filter(r => r.score >= 0)
        .sort((a, b) => b.score - a.score)
        .map(r => r.slime);
      if (results.length === 0) {
        grid.innerHTML = '<div class="inv-no-results">No Slimes Found</div>';
        return;
      }
      results.forEach(s => {
        const card = document.createElement('div');
        card.className = 'inv-card' + (PendingSlime && PendingSlime.name === s.name ? ' selected' : '');
        card.innerHTML = `
          <span class="inv-card-name">${s.name}</span>
          <span class="inv-card-tier" style="color:${s.color}">${s.tier}</span>
        `;
        card.onclick = () => SelectPending(s);
        grid.appendChild(card);
      });
    }

    function SelectPending(slime) {
      PendingSlime = slime;
      ActiveMutations.clear();
      document.getElementById('mut-panel').classList.add('visible');
      document.getElementById('mut-slime-name').textContent = slime.name;
      RenderMutPanel();
      RenderInventory();
    }

    function RenderMutPanel() {
      const container = document.getElementById('mut-tags');
      container.innerHTML = '';

      const CurrentSize = [...ActiveMutations].find(m => SIZE_GROUP.has(m)) || null;
      const atMax = ActiveMutations.size >= 3;

      MUT_ORDER.forEach(m => {
        const isActive = ActiveMutations.has(m);
        const ConflictsSize = SIZE_GROUP.has(m) && CurrentSize && CurrentSize !== m;
        const isDisabled = (!isActive && atMax) || ConflictsSize;

        const btn = document.createElement('button');
        btn.className = 'mut-tag' + (isActive ? ' active' : '') + (isDisabled ? ' disabled' : '');
        btn.textContent = m;
        btn.onclick = () => {
          if (isDisabled) return;
          if (isActive) ActiveMutations.delete(m);
          else ActiveMutations.add(m);
          RenderMutPanel();
        };
        container.appendChild(btn);
      });

      const preview = MutLabel(ActiveMutations);
      document.getElementById('mut-preview').textContent = preview ? preview : 'No Mutations';
    }

    function ApplySlime() {
      if (ActiveSlotIndex === null || !PendingSlime) return;
      SlotData[ActiveSlotIndex] = {
        ...PendingSlime,
        mutations: OrderedMutations(ActiveMutations),
      };
      UpdateEquippedLabel();
      RenderSlots();
      CloseInventory();
    }

    ChangeSlots(0);
  </script>
</body>
</html>
